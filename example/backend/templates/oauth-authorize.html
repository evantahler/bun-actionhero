<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authorize Application</title>
    <style>
      {{> commonCss}}
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Authorize Application</h2>
      {{{errorHtml}}} {{#hasSignin}}{{#hasSignup}}
      <div class="tabs">
        <div class="tab active" onclick="switchTab('signin')">Sign In</div>
        <div class="tab" onclick="switchTab('signup')">Sign Up</div>
      </div>
      {{/hasSignup}}{{/hasSignin}} {{#hasSignin}}
      <div id="signin-form" class="form-section active">
        <form method="POST" action="/oauth/authorize">
          {{{hiddenFields}}}
          <input type="hidden" name="mode" value="signin" />
          {{{signinFieldsHtml}}}
          <button type="submit">Sign In</button>
        </form>
      </div>
      {{/hasSignin}} {{#hasSignup}}
      <div
        id="signup-form"
        class="form-section{{^hasSignin}} active{{/hasSignin}}"
      >
        <form method="POST" action="/oauth/authorize">
          {{{hiddenFields}}}
          <input type="hidden" name="mode" value="signup" />
          {{{signupFieldsHtml}}}
          <button type="submit">Sign Up</button>
        </form>
      </div>
      {{/hasSignup}}
    </div>
    <div class="lion">{{> lionSvg}}</div>
    <script>
      function switchTab(tab) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".form-section")
          .forEach((f) => f.classList.remove("active"));
        document.querySelector("#" + tab + "-form").classList.add("active");
        event.target.classList.add("active");
      }
    </script>
  </body>
</html>
